# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en-US
early_access: false
tone_instructions: "Be concise. Only flag correctness, security, and architecture issues; skip style nitpicks covered by oxlint/oxfmt."

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: false
  collapse_walkthrough: true
  sequence_diagrams: false

  auto_review:
    enabled: true
    auto_incremental_review: false
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!**/pnpm-lock.yaml"
    - "!**/styled-system/**"
    - "!**/dist/**"
    - "!**/.next/**"
    - "!**/coverage/**"
    - "!**/*.snap"
    - "!**/playwright-report/**"
    - "!CHANGELOG.md"

  path_instructions:
    - path: "packages/**/*.{ts,tsx}"
      instructions: >-
        Respect dependency-direction rules: tokens/env are leaves; only
        Next.js apps import from storyblok-next; ui must not import back from
        now-playing. Prefer `function` declarations for helpers/components,
        `interface` for object shapes, no enums, no default exports outside
        apps/portfolio/app/**.
    - path: "apps/portfolio/**/*.{ts,tsx}"
      instructions: >-
        Server Components by default; flag unnecessary "use client". Env access
        must go through @httpjpg/env, never process.env (except NODE_ENV).
        Storyblok data fetching stays server-side via storyblok-next.

  # Linters below run in CI already; gitleaks kept since CI has no secret scan.
  tools:
    biome:
      enabled: false
    eslint:
      enabled: false
    oxc:
      enabled: false
    markdownlint:
      enabled: false
    yamllint:
      enabled: false
    actionlint:
      enabled: false
    shellcheck:
      enabled: false
    semgrep:
      enabled: false
    ast-grep:
      enabled: false
    gitleaks:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: local
  issues:
    scope: local
