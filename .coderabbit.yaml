# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration — tuned for low noise / low cost.
# CI (.github/workflows/ci.yml) already runs oxlint, type-check, Vitest,
# build and Playwright, so CodeRabbit does NOT re-run those linters here.
# It focuses on logic, architecture and security review instead.

language: en-US
early_access: false
tone_instructions: "Be concise. Only flag substantive issues (correctness, security, architecture). Skip stylistic nitpicks that oxlint/oxfmt already cover."

reviews:
  # 'chill' = far fewer nitpicks than the default 'assertive' profile.
  profile: chill

  # Don't gate merges on CodeRabbit; CI is the source of truth.
  request_changes_workflow: false

  high_level_summary: true
  poem: false
  review_status: false
  collapse_walkthrough: true
  sequence_diagrams: false

  auto_review:
    enabled: true
    # The big cost/noise saver: do NOT re-review on every push.
    # Review the full PR once; skip incremental passes per commit.
    auto_incremental_review: false
    # Skip draft PRs entirely.
    drafts: false
    base_branches:
      - main

  # Skip generated / lockfile / vendored paths so they never consume a review.
  path_filters:
    - "!**/pnpm-lock.yaml"
    - "!**/styled-system/**"
    - "!**/dist/**"
    - "!**/.next/**"
    - "!**/coverage/**"
    - "!**/*.snap"
    - "!**/playwright-report/**"
    - "!CHANGELOG.md"

  # Targeted guidance instead of broad commentary (matches CLAUDE.md conventions).
  path_instructions:
    - path: "packages/**/*.{ts,tsx}"
      instructions: >-
        Respect dependency-direction rules: tokens/env are leaves; only
        Next.js apps import from storyblok-next; ui must not import back from
        now-playing. Prefer `function` declarations for helpers/components,
        `interface` for object shapes, no enums, no default exports outside
        apps/portfolio/app/**.
    - path: "apps/portfolio/**/*.{ts,tsx}"
      instructions: >-
        Server Components by default; flag unnecessary "use client". Env access
        must go through @httpjpg/env, never process.env (except NODE_ENV).
        Storyblok data fetching stays server-side via storyblok-next.

  # --- Tooling --------------------------------------------------------------
  # Disabled: anything CI already covers, to avoid duplicate comments.
  # Kept: gitleaks (no secret scanning in CI) — flip to false if undesired.
  tools:
    biome:
      enabled: false
    eslint:
      enabled: false
    oxc:
      enabled: false
    markdownlint:
      enabled: false
    yamllint:
      enabled: false
    actionlint:
      enabled: false
    shellcheck:
      enabled: false
    semgrep:
      enabled: false
    ast-grep:
      enabled: false
    gitleaks:
      enabled: true

# Keep @coderabbitai chat available, but no automatic, unprompted noise.
chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: local
  issues:
    scope: local
