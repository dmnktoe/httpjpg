codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: true

component_management:
  individual_components:
    - component_id: ui
      name: ui
      paths:
        - "packages/ui/**"
    - component_id: storyblok
      name: storyblok
      paths:
        - "packages/storyblok-*/**"
    - component_id: integrations
      name: integrations
      paths:
        - "packages/spotify/**"
        - "packages/now-playing/**"
        - "packages/analytics/**"
        - "packages/consent/**"
        - "packages/observability/**"
    - component_id: foundations
      name: foundations
      paths:
        - "packages/env/**"
        - "packages/tokens/**"
    - component_id: portfolio
      name: portfolio
      paths:
        - "apps/portfolio/**"

ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/tests/**"
  - "**/__tests__/**"
  - "**/node_modules/**"
  - "**/.next/**"
  - "**/dist/**"
  - "**/coverage/**"
  - "**/styled-system/**"
  - "**/*.config.*"
  - "**/*.d.ts"

comment:
  layout: "reach,diff,components,tree"
  behavior: default
  require_changes: false
