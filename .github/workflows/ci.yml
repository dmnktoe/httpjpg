name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  NEXT_PUBLIC_APP_URL: https://httpjpg.com
  NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
  NEXT_PUBLIC_STORYBLOK_VERSION: published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # ── Fast checks (no dependencies, all start immediately) ───────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm run type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm run test:coverage
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  # ── Builds ─────────────────────────────────────────────────────────
  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm run build --filter="./packages/*"

  build-apps:
    name: Build Apps
    runs-on: ubuntu-latest
    needs: [build-packages]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        app: [portfolio, storybook]
    env:
      NEXT_PUBLIC_STORYBLOK_TOKEN: ${{ secrets.NEXT_PUBLIC_STORYBLOK_TOKEN }}
      STORYBLOK_PREVIEW_TOKEN: ${{ secrets.STORYBLOK_PREVIEW_TOKEN }}
      STORYBLOK_PREVIEW_SECRET: ${{ secrets.STORYBLOK_PREVIEW_SECRET }}
      STORYBLOK_REVALIDATE_SECRET: ${{ secrets.STORYBLOK_REVALIDATE_SECRET }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
      ARCJET_KEY: ${{ secrets.ARCJET_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - name: Build ${{ matrix.app }}
        run: pnpm run build --filter=@httpjpg/${{ matrix.app }}
      - name: Package build artifacts
        if: matrix.app == 'portfolio'
        run: tar -czf portfolio-build.tar.gz --exclude='.next/cache' -C apps/portfolio .next
      - name: Upload build artifacts
        if: matrix.app == 'portfolio'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: portfolio-build
          path: portfolio-build.tar.gz
          retention-days: 1
      - name: Upload Sentry sourcemaps
        if: matrix.app == 'portfolio' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          pnpm --filter=@httpjpg/portfolio exec sentry-cli sourcemaps upload \
            --org=${{ secrets.SENTRY_ORG }} \
            --project=${{ secrets.SENTRY_PROJECT }} \
            --release=${{ github.sha }} \
            .next/static

  # ── Integration tests ──────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build-apps]
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_STORYBLOK_TOKEN: ${{ secrets.NEXT_PUBLIC_STORYBLOK_TOKEN }}
      STORYBLOK_PREVIEW_TOKEN: ${{ secrets.STORYBLOK_PREVIEW_TOKEN }}
      STORYBLOK_PREVIEW_SECRET: ${{ secrets.STORYBLOK_PREVIEW_SECRET }}
      STORYBLOK_REVALIDATE_SECRET: ${{ secrets.STORYBLOK_REVALIDATE_SECRET }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
      ARCJET_KEY: ${{ secrets.ARCJET_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: portfolio-build
      - name: Extract build artifacts
        run: |
          tar -xzf portfolio-build.tar.gz -C apps/portfolio
          cat apps/portfolio/.next/BUILD_ID
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter=@httpjpg/portfolio exec playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter=@httpjpg/portfolio exec playwright install-deps chromium
      - name: Run E2E tests
        run: pnpm --filter=@httpjpg/portfolio run test:e2e
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: apps/portfolio/playwright-report/
          retention-days: 30

  # ── Visual regression ──────────────────────────────────────────────
  visual:
    name: Visual Regression (Chromatic)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check for visual-relevant changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$BASE"...HEAD | grep -qE '^(apps/storybook|packages/(ui|tokens|now-playing|spotify))/'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/setup
        if: steps.changes.outputs.relevant == 'true'
      - name: Run Chromatic
        if: steps.changes.outputs.relevant == 'true'
        uses: chromaui/action@8ad69a40dea06755a3c6db290f300a39e011433b # v17
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          buildScriptName: build
          onlyChanged: true
          autoAcceptChanges: main
          exitZeroOnChanges: true
          exitOnceUploaded: true

  # ── Gate ────────────────────────────────────────────────────────────
  ci:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build-packages, build-apps, test, e2e, visual]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Write summary
        run: |
          {
            echo "## CI Results"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Lint              | ${{ needs.lint.result }} |"
            echo "| TypeScript        | ${{ needs.typecheck.result }} |"
            echo "| Unit Tests        | ${{ needs.test.result }} |"
            echo "| Build Packages    | ${{ needs.build-packages.result }} |"
            echo "| Build Apps        | ${{ needs.build-apps.result }} |"
            echo "| E2E Tests         | ${{ needs.e2e.result }} |"
            echo "| Visual Regression | ${{ needs.visual.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Verify pipeline status
        run: |
          failed=false
          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.typecheck.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.build-packages.result }}" \
            "${{ needs.build-apps.result }}" \
            "${{ needs.e2e.result }}" \
            "${{ needs.visual.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed=true
            fi
          done
          if [[ "$failed" == "true" ]]; then
            echo "Pipeline failed"
            exit 1
          fi
