# Labels-as-code — single source of truth for repo labels.
# Synced by .github/workflows/labels.yml (prunes anything not listed here).
# Pastel palette, grouped by concern. Keep in sync with addLabels in renovate.json.

# ── Dependencies ─────────────────────────────────────────────────────
- name: dependencies
  color: "c7defa"
  description: "Dependency update"
- name: deps:prod
  color: "cde2c0"
  description: "Runtime dependency"
- name: deps:dev
  color: "e3d7f4"
  description: "Development dependency"
- name: deps:types
  color: "d6dcf7"
  description: "TypeScript type definitions (@types/*)"
- name: deps:test
  color: "c6ece4"
  description: "Test tooling (vitest, playwright, testing-library)"

# ── Risk & flow ──────────────────────────────────────────────────────
- name: breaking
  color: "f6c6c6"
  description: "Major / breaking change"
- name: manual-review
  color: "fbe0c3"
  description: "Needs a human before merge"
- name: security
  color: "f9b9b0"
  description: "Security / vulnerability fix"
- name: priority:high
  color: "fad1b0"
  description: "High priority"

# ── Scope: apps ──────────────────────────────────────────────────────
- name: app:portfolio
  color: "bfe3f5"
  description: "apps/portfolio"
- name: app:storybook
  color: "f7c8dd"
  description: "apps/storybook"

# ── Scope: workspace ─────────────────────────────────────────────────
- name: scope:packages
  color: "d8e8c4"
  description: "packages/*"
- name: scope:root
  color: "d3dae0"
  description: "Root workspace tooling"
- name: scope:tooling
  color: "e0d5cc"
  description: "Toolchain pins (Node, pnpm)"
- name: storyblok
  color: "aee7e3"
  description: "Storyblok stack (workspace + npm)"

# ── CI & infra ───────────────────────────────────────────────────────
- name: ci
  color: "cdd2f0"
  description: "GitHub Actions / CI"
- name: docker
  color: "c2dbf2"
  description: "Docker images"
